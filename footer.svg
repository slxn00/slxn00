<svg width="1584" height="120" viewBox="0 0 1584 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#000" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#111" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .footer-txt {
        font-family: 'Outfit', Georgia, sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 3px;
        fill: rgba(255,255,255,0.35);
        text-anchor: middle;
      }
      .footer-name {
        font-family: 'Outfit', Georgia, sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 2px;
        fill: rgba(255,255,255,0.5);
        text-anchor: middle;
      }
    </style>
    <clipPath id="fc"><rect width="1584" height="120" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#fc)">
    <rect width="1584" height="120" fill="url(#bg)" rx="20"/>
    <rect width="1584" height="120" fill="url(#gl)" rx="20"/>
    <rect width="1584" height="120" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- top divider line -->
    <rect x="0" y="0" width="1584" height="1" fill="url(#topLine)"/>

    <!-- center text -->
    <text x="792" y="52" class="footer-name">Min Seoyeon</text>
    <text x="792" y="72" class="footer-txt">frontend developer · designer</text>

    <!-- bottom subtle line -->
    <rect x="592" y="92" width="400" height="1" fill="rgba(255,255,255,0.08)" rx="1"/>
  </g>
</svg>
