<svg width="1584" height="440" viewBox="0 0 1584 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .eyebrow {
        font-family: 'Outfit', Georgia, sans-serif;
        font-size: 11px; font-weight: 400; letter-spacing: 4px;
        fill: rgba(255,255,255,0.5); text-anchor: middle;
        animation: fadeUp 1s 0.1s cubic-bezier(0.16,1,0.3,1) both;
      }
      .title {
        font-family: 'Outfit', Georgia, sans-serif;
        font-size: 58px; font-weight: 900; letter-spacing: -1.5px;
        fill: #ffffff; text-anchor: middle;
        animation: fadeUp 1s 0.2s cubic-bezier(0.16,1,0.3,1) both;
      }
      .chip-bg { fill: rgba(255,255,255,0.05); }
      .chip-bd { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 1; }
      .chip-txt {
        font-family: 'Outfit', Georgia, sans-serif;
        font-size: 13px; font-weight: 400;
        fill: rgba(255,255,255,0.8);
        dominant-baseline: central; text-anchor: start;
      }
      .row1 { animation: slideLeft  28s linear infinite; }
      .row2 { animation: slideRight 34s linear infinite; }
      @keyframes slideLeft  { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
      @keyframes slideRight { from { transform: translateX(-50%); } to { transform: translateX(0); }    }
      @keyframes fadeUp {
        from { opacity:0; transform: translateY(14px); }
        to   { opacity:1; transform: translateY(0); }
      }
    </style>
    <linearGradient id="fL" x1="0%" y1="0%" x2="100%" y2="0%">
